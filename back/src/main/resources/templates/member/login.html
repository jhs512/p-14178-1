<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>로그인</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card bg-base-100 shadow max-w-md mx-auto">
        <div class="card-body">
            <h2 class="card-title">로그인</h2>

            <div th:if="${param.error}" class="alert alert-error">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                로그아웃되었습니다.
            </div>

            <form th:action="@{/member/login}" method="post" class="space-y-2">
                <input type="text" name="username" placeholder="아이디"
                       class="input input-bordered w-full"/>
                <input type="password" name="password" placeholder="비밀번호"
                       class="input input-bordered w-full"/>
                <button type="submit" class="btn btn-primary w-full">로그인</button>
            </form>

            <a th:href="@{/member/join}" class="link">회원가입</a>
        </div>
    </div>
</div>
</body>
</html>
