<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>회원가입</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card bg-base-100 shadow max-w-md mx-auto">
        <div class="card-body">
            <h2 class="card-title">회원가입</h2>

            <form th:action="@{/member/join}" th:object="${form}" method="post" class="space-y-2">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error">
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}">오류</span>
                </div>
                <div>
                    <input type="text" th:field="*{username}" placeholder="아이디"
                           class="input input-bordered w-full"/>
                    <p class="text-error text-sm" th:if="${#fields.hasErrors('username')}"
                       th:errors="*{username}">아이디 오류</p>
                </div>
                <div>
                    <input type="password" th:field="*{password}" placeholder="비밀번호"
                           class="input input-bordered w-full"/>
                    <p class="text-error text-sm" th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}">비밀번호 오류</p>
                </div>
                <div>
                    <input type="text" th:field="*{nickname}" placeholder="닉네임"
                           class="input input-bordered w-full"/>
                    <p class="text-error text-sm" th:if="${#fields.hasErrors('nickname')}"
                       th:errors="*{nickname}">닉네임 오류</p>
                </div>
                <button type="submit" class="btn btn-primary w-full">가입하기</button>
            </form>

            <a th:href="@{/member/login}" class="link">이미 계정이 있으신가요? 로그인</a>
        </div>
    </div>
</div>
</body>
</html>
