<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>글 수정</title>
</head>
<body>
<div layout:fragment="content">
    <div class="bg-base-100 rounded-box shadow p-6">
        <h1 class="text-2xl font-bold mb-4">글 수정</h1>
        <form th:action="@{/posts/{id}/edit(id=${postId})}" th:object="${form}" method="post" class="space-y-3">
            <div>
                <input type="text" th:field="*{title}" placeholder="제목"
                       class="input input-bordered w-full"/>
                <p class="text-error text-sm" th:if="${#fields.hasErrors('title')}"
                   th:errors="*{title}">제목 오류</p>
            </div>
            <div>
                <textarea th:field="*{content}" rows="12" placeholder="내용 (마크다운 지원)"
                          class="textarea textarea-bordered w-full font-mono"></textarea>
                <p class="text-error text-sm" th:if="${#fields.hasErrors('content')}"
                   th:errors="*{content}">내용 오류</p>
            </div>
            <div class="flex gap-2">
                <button type="submit" class="btn btn-primary">수정</button>
                <a th:href="@{/posts/{id}(id=${postId})}" class="btn">취소</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
